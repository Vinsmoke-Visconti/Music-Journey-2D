<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Music Journey 2D — Trình phát nhạc với xe di chuyển theo nhịp âm thanh, parallax đa lớp và hiệu ứng vật lý." />
  <title>Music Journey 2D</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────── RESET & TOKENS ─────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f1a;
      --surface:     rgba(15, 17, 35, 0.82);
      --surface2:    rgba(255,255,255,0.06);
      --border:      rgba(255,255,255,0.10);
      --accent:      #f9c74f;
      --accent2:     #f4845f;
      --green:       #10b981;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --text:        #e8eaf0;
      --muted:       #8892a4;
      --radius:      14px;
      --radius-sm:   8px;
      --blur:        blur(18px);
      --shadow:      0 8px 32px rgba(0,0,0,0.55);
      --transition:  0.25s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    /* ─────────────── LAYOUT ─────────────── */
    #app-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* PixiJS canvas chiếm phần lớn */
    #app {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #app canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ─────────────── LOADING SCREEN ─────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: fadeIn .6s ease;
    }
    #loading-screen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(249,199,79,.6);
    }
    #loading-screen p { color: var(--muted); font-size: .9rem; }
    .loader {
      width: 44px; height: 44px;
      border: 4px solid rgba(249,199,79,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; } }

    /* ─────────────── TOP BAR ─────────────── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,.5), transparent);
    }
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(249,199,79,.5);
    }
    .top-selects { display: flex; gap: 10px; }
    .top-selects select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      backdrop-filter: var(--blur);
      outline: none;
      transition: border-color var(--transition);
    }
    .top-selects select:hover { border-color: var(--accent); }

    #auth-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      margin-right: 10px;
    }
    #auth-btn:hover { background: #fff; transform: translateY(-1px); }
    #auth-btn .user-email { color: #333; font-weight: normal; margin-right: 4px; }

    #shop-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: var(--blur);
      margin-right: 8px;
    }
    #shop-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ─────────────── DEBUG HUD (Góc trên phải) ─────────────── */
    #hud {
      position: absolute;
      top: 60px; right: 16px;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: .72rem;
      color: var(--muted);
      backdrop-filter: var(--blur);
      min-width: 160px;
    }
    #hud .hud-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    #hud .hud-row:last-child { margin-bottom: 0; }
    #hud .hud-label { color: var(--muted); white-space: nowrap; }
    #hud .hud-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
    #hud .hud-bar { height: 100%; border-radius: 4px; transition: width .08s linear; }
    #speed-bar { background: linear-gradient(90deg, #10b981, #34d399); }
    #bass-bar  { background: linear-gradient(90deg, #f9c74f, #f4845f); }
    #fsm-state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .65rem;
      font-weight: 600;
      color: #fff;
      background: #6b7280;
      transition: background .3s;
      letter-spacing: .5px;
    }

    /* ─────────────── PLAYER PANEL (Dưới cùng) ─────────────── */
    #player-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 20px 18px;
    }
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      padding: 16px 20px 14px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    /* --- Track Info (Left) --- */
    .track-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .album-art {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      animation: albumSpin 8s linear infinite paused;
      box-shadow: 0 4px 14px rgba(249,199,79,.3);
    }
    .album-art.playing { animation-play-state: running; }
    @keyframes albumSpin { to { transform: rotate(360deg); } }
    .track-text { min-width: 0; }
    #track-name {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    #time-display { font-size: .72rem; color: var(--muted); margin-top: 2px; display: block; }

    /* --- Controls (Center) --- */
    .controls-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .ctrl-buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: .9rem;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,.12); transform: scale(1.08); }
    #play-btn {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      color: #0d0f1a;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 18px rgba(249,199,79,.4);
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(249,199,79,.55); }
    #play-btn:active { transform: scale(.96); }

    /* Progress bar */
    .progress-wrap {
      width: 340px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,.12);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width .2s linear;
    }
    #progress-bar:hover { height: 7px; }

    /* --- Right (Volume + Visualizer) --- */
    .right-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .vol-icon { font-size: .85rem; color: var(--muted); }
    #volume-slider {
      -webkit-appearance: none;
      width: 90px; height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.15);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(249,199,79,.5);
    }

    /* Mini Visualizer Canvas */
    #visualizer {
      width: 120px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
    }

    /* ─────────────── PLAYLIST SIDEBAR ─────────────── */
    #playlist-btn {
      position: absolute;
      right: 20px; bottom: 130px;
      z-index: 11;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: var(--blur);
      font-size: 1rem;
      transition: all var(--transition);
    }
    #playlist-btn:hover { transform: scale(1.1); background: rgba(255,255,255,.1); }

    #playlist-panel {
      position: absolute;
      right: 20px;
      bottom: 115px;
      z-index: 12;
      width: 260px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      padding: 12px;
      display: none;
      max-height: 350px;
      overflow-y: auto;
    }
    /* Tùy chỉnh thanh cuộn (Custom Scrollbar) */
    #playlist-panel::-webkit-scrollbar {
      width: 5px;
    }
    #playlist-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #playlist-panel::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
      opacity: 0.5;
    }
    #playlist-panel::-webkit-scrollbar-thumb:hover {
      background: #fff;
    }
    #playlist-panel.open { display: block; animation: slideUp .2s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; } }
    #playlist-panel h3 {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .pl-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: .83rem;
      transition: background var(--transition);
    }
    .pl-item:hover { background: var(--surface2); }
    .pl-item.active {
      background: rgba(249,199,79,.12);
      color: var(--accent);
      font-weight: 600;
    }
    .pl-num { color: var(--muted); font-size: .72rem; width: 16px; text-align: center; }

    /* ─────────────── LOCK TOAST ─────────────── */
    #lock-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 200;
      background: rgba(239,68,68,0.92);
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(239,68,68,.4);
      pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }
    #lock-toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─────────────── RESPONSIVE ─────────────── */
    @media (max-width: 640px) {
      .player-card { grid-template-columns: 1fr; gap: 10px; }
      .right-panel { flex-direction: row; justify-content: space-between; align-items: center; }
      .progress-wrap { width: 100%; }
      #hud { display: none; }
    }
  </style>
</head>
<body>
<div id="app-wrapper">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader"></div>
    <h1>Music Journey</h1>
    <p>Đang khởi tạo engine...</p>
  </div>

  <!-- PixiJS Canvas -->
  <div id="app"></div>

  <!-- Audio element (ẩn, chỉ dùng để phân tích) -->
  <audio id="audio-el" crossorigin="anonymous" preload="none"></audio>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="logo">🚐 MUSIC JOURNEY 2D</div>
    <div class="top-selects">
      <button id="shop-btn">🛒 Shop</button>
      <button id="auth-btn">Loading...</button>
      <select id="env-select" title="Chọn môi trường">
        <option value="beach">🏖️ Bãi biển</option>
        <option value="desert">🏜️ Sa mạc</option>
        <option value="snow">🏔️ Núi tuyết</option>
        <option value="jungle">🌿 Rừng Rậm 🔒</option>
      </select>
      <select id="vehicle-select" title="Chọn xe">
        <option value="van">🚐 Xe Van (Miễn phí)</option>
        <option value="jeep">🔒 Jeep Địa Hình – 49k</option>
        <option value="pickup">🔒 Xe Bán Tải – 39k</option>
      </select>
    </div>
  </div>

  <!-- Lock Toast -->
  <div id="lock-toast"></div>

  <!-- Debug HUD -->
  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">Trạng thái</span>
      <span id="fsm-state">IDLE</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Tốc độ</span>
      <div class="hud-bar-wrap"><div class="hud-bar" id="speed-bar" style="width:0%"></div></div>
    </div>
    <div class="hud-row">
      <span class="hud-label">Bass</span>
      <div class="hud-bar-wrap"><div class="hud-bar" id="bass-bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Playlist Button -->
  <button id="playlist-btn" title="Playlist">🎵</button>

  <!-- Playlist Panel -->
  <div id="playlist-panel">
    <h3>📋 Playlist</h3>
    <div id="playlist-items"></div>
  </div>

  <!-- Player Panel -->
  <div id="player-panel">
    <div class="player-card">

      <!-- Left: Track info -->
      <div class="track-info">
        <div class="album-art" id="album-art">🎵</div>
        <div class="track-text">
          <span id="track-name">Chọn bài nhạc...</span>
          <span id="time-display">0:00 / 0:00</span>
        </div>
      </div>

      <!-- Center: Controls + Progress -->
      <div class="controls-center">
        <div class="ctrl-buttons">
          <button class="ctrl-btn" id="prev-btn" title="Bài trước">⏮</button>
          <button id="play-btn" title="Phát/Dừng"><span class="icon">▶</span></button>
          <button class="ctrl-btn" id="next-btn" title="Bài kế">⏭</button>
        </div>
        <div class="progress-wrap">
          <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>
      </div>

      <!-- Right: Volume + Visualizer -->
      <div class="right-panel">
        <div class="volume-row">
          <span class="vol-icon">🔈</span>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" />
          <span class="vol-icon">🔊</span>
        </div>
        <canvas id="visualizer" width="180" height="36"></canvas>
      </div>

    </div>
  </div>

</div>

<script>
  // Playlist panel toggle
  document.getElementById('playlist-btn').addEventListener('click', () => {
    document.getElementById('playlist-panel').classList.toggle('open');
  });

  // Click playlist item
  document.querySelectorAll('.pl-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      // loadTrack được gọi từ main.ts qua global nếu cần
      // Đây là fallback nếu main.ts đã expose
      if (window.__loadTrack) {
        window.__loadTrack(idx);
        const audioEl = document.getElementById('audio-el');
        audioEl.play();
        document.getElementById('play-btn').innerHTML = '<span class="icon">⏸</span>';
        document.getElementById('album-art').classList.add('playing');
      }
    });
  });

  // Album art animation khi play/pause
  document.getElementById('audio-el').addEventListener('play', () => {
    document.getElementById('album-art').classList.add('playing');
  });
  document.getElementById('audio-el').addEventListener('pause', () => {
    document.getElementById('album-art').classList.remove('playing');
  });

  // Đóng playlist khi click ra ngoài
  document.addEventListener('click', (e) => {
    const panel = document.getElementById('playlist-panel');
    const btn   = document.getElementById('playlist-btn');
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
    }
  });
</script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
