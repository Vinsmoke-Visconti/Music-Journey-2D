<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Music Journey 2D — Trình phát nhạc với xe di chuyển theo nhịp âm thanh, parallax đa lớp và hiệu ứng vật lý." />
  <title>Music Journey 2D</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet" />

  <style>
    /* ─────────────── RESET & TOKENS ─────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0d0f1a;
      --surface:     rgba(15, 17, 35, 0.82);
      --surface2:    rgba(255,255,255,0.06);
      --border:      rgba(255,255,255,0.10);
      --accent:      #f9c74f;
      --accent2:     #f4845f;
      --green:       #10b981;
      --red:         #ef4444;
      --amber:       #f59e0b;
      --text:        #e8eaf0;
      --muted:       #8892a4;
      --radius:      14px;
      --radius-sm:   8px;
      --blur:        blur(18px);
      --shadow:      0 8px 32px rgba(0,0,0,0.55);
      --transition:  0.25s cubic-bezier(.4,0,.2,1);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      overflow: hidden;
      user-select: none;
    }

    /* ─────────────── LAYOUT ─────────────── */
    #app-wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* PixiJS canvas chiếm phần lớn */
    #app {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    #app canvas { display: block; width: 100% !important; height: 100% !important; }

    /* ─────────────── LOADING SCREEN ─────────────── */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      animation: fadeIn .6s ease;
    }
    #loading-screen h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: 3px;
      text-shadow: 0 0 20px rgba(249,199,79,.6);
    }
    #loading-screen p { color: var(--muted); font-size: .9rem; }
    .loader {
      width: 44px; height: 44px;
      border: 4px solid rgba(249,199,79,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; } }

    /* ─────────────── TOP BAR ─────────────── */
    #top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: linear-gradient(to bottom, rgba(0,0,0,.5), transparent);
    }
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 0 12px rgba(249,199,79,.5);
    }
    .top-selects { display: flex; gap: 10px; }
    .top-selects select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      backdrop-filter: var(--blur);
      outline: none;
      transition: border-color var(--transition);
    }
    .top-selects select:hover { border-color: var(--accent); }

    #auth-btn {
      background: var(--accent);
      border: none;
      color: #000;
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      margin-right: 10px;
    }
    #auth-btn:hover { background: #fff; transform: translateY(-1px); }
    #auth-btn .user-email { color: #333; font-weight: normal; margin-right: 4px; }

    #shop-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: var(--blur);
      margin-right: 8px;
    }
    #shop-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }

    /* ─────────────── DEBUG HUD (Góc trên phải) ─────────────── */
    #hud {
      position: absolute;
      top: 60px; right: 16px;
      z-index: 10;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: .72rem;
      color: var(--muted);
      backdrop-filter: var(--blur);
      min-width: 160px;
    }
    #hud .hud-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    #hud .hud-row:last-child { margin-bottom: 0; }
    #hud .hud-label { color: var(--muted); white-space: nowrap; }
    #hud .hud-bar-wrap { flex: 1; height: 5px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
    #hud .hud-bar { height: 100%; border-radius: 4px; transition: width .08s linear; }
    #speed-bar { background: linear-gradient(90deg, #10b981, #34d399); }
    #bass-bar  { background: linear-gradient(90deg, #f9c74f, #f4845f); }
    #fsm-state {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: .65rem;
      font-weight: 600;
      color: #fff;
      background: #6b7280;
      transition: background .3s;
      letter-spacing: .5px;
    }

    /* ─────────────── PLAYER PANEL (Dưới cùng) ─────────────── */
    #player-panel {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 10;
      padding: 0 20px 18px;
    }
    .player-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      padding: 16px 20px 14px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }

    /* --- Track Info (Left) --- */
    .track-info {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .album-art {
      width: 48px; height: 48px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      flex-shrink: 0;
      animation: albumSpin 8s linear infinite paused;
      box-shadow: 0 4px 14px rgba(249,199,79,.3);
    }
    .album-art.playing { animation-play-state: running; }
    @keyframes albumSpin { to { transform: rotate(360deg); } }
    .track-text { min-width: 0; }
    #track-name {
      font-size: .88rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    #time-display { font-size: .72rem; color: var(--muted); margin-top: 2px; display: block; }

    /* --- Controls (Center) --- */
    .controls-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .ctrl-buttons {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .ctrl-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all var(--transition);
      font-size: .9rem;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,.12); transform: scale(1.08); }
    #play-btn {
      width: 50px; height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 50%;
      color: #0d0f1a;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 18px rgba(249,199,79,.4);
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(249,199,79,.55); }
    #play-btn:active { transform: scale(.96); }

    /* Progress bar */
    .progress-wrap {
      width: 340px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #progress-bar {
      flex: 1;
      height: 5px;
      background: rgba(255,255,255,.12);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      transition: width .2s linear;
    }
    #progress-bar:hover { height: 7px; }

    /* --- Right (Volume + Visualizer) --- */
    .right-panel {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }
    .volume-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .vol-icon { font-size: .85rem; color: var(--muted); }
    #volume-slider {
      -webkit-appearance: none;
      width: 90px; height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.15);
      outline: none;
      cursor: pointer;
    }
    #volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(249,199,79,.5);
    }

    /* Mini Visualizer Canvas */
    #visualizer {
      width: 120px;
      height: 28px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
    }

    /* ─────────────── PLAYLIST SIDEBAR ─────────────── */
    #playlist-btn {
      position: absolute;
      right: 20px; bottom: 130px;
      z-index: 11;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: var(--blur);
      font-size: 1rem;
      transition: all var(--transition);
    }
    #playlist-btn:hover { transform: scale(1.1); background: rgba(255,255,255,.1); }

    #playlist-panel {
      position: absolute;
      right: 20px;
      bottom: 115px;
      z-index: 12;
      width: 280px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: var(--blur);
      box-shadow: var(--shadow);
      padding: 12px;
      display: none;
      max-height: 400px;
      overflow-y: auto;
    }
    /* Tùy chỉnh thanh cuộn (Custom Scrollbar) */
    #playlist-panel::-webkit-scrollbar { width: 5px; }
    #playlist-panel::-webkit-scrollbar-track { background: transparent; }
    #playlist-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    #playlist-panel::-webkit-scrollbar-thumb:hover { background: #fff; }
    #playlist-panel.open { display: block; animation: slideUp .2s ease; }
    @keyframes slideUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; } }

    /* Playlist header row */
    .playlist-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .playlist-header h3 {
      font-size: .75rem;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    /* Upload button */
    #upload-track-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px dashed var(--accent);
      background: rgba(249,199,79,.08);
      color: var(--accent);
      font-family: 'Outfit', sans-serif;
      font-size: .72rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
    }
    #upload-track-btn:hover {
      background: rgba(249,199,79,.18);
      transform: scale(1.04);
    }
    #upload-track-btn .upload-icon { font-size: .9rem; }
    /* Hidden file input */
    #custom-track-input { display: none; }

    /* Custom track badge */
    .pl-badge-custom {
      font-size: .62rem;
      padding: 1px 6px;
      border-radius: 20px;
      background: rgba(249,199,79,.18);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .pl-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: .83rem;
      transition: background var(--transition);
    }
    .pl-item:hover { background: var(--surface2); }
    .pl-item.active {
      background: rgba(249,199,79,.12);
      color: var(--accent);
      font-weight: 600;
    }
    .pl-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .pl-num { color: var(--muted); font-size: .72rem; width: 16px; text-align: center; flex-shrink: 0; }

    /* ─────────────── LOCK TOAST ─────────────── */
    #lock-toast {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      z-index: 200;
      background: rgba(239,68,68,0.92);
      color: #fff;
      font-size: .85rem;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(239,68,68,.4);
      pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0;
      white-space: nowrap;
    }
    #lock-toast.visible {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ─────────────── RESPONSIVE ─────────────── */
    @media (max-width: 640px) {
      .player-card { grid-template-columns: 1fr; gap: 10px; }
      .right-panel { flex-direction: row; justify-content: space-between; align-items: center; }
      .progress-wrap { width: 100%; }
      #hud { display: none; }
    }

    /* ─────────────── PIXEL ART EDITOR MODAL ─────────────── */
    #pixel-editor-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }
    #pixel-editor-overlay.open { display: flex; animation: fadeIn .2s ease; }

    #pixel-editor-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 24px 64px rgba(0,0,0,.7);
      padding: 20px 24px;
      width: min(900px, 98vw);
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 97vh;
      overflow-y: auto;
      position: relative;
    }
    .pe-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .pe-title {
      font-family: 'Press Start 2P', monospace;
      font-size: .72rem;
      color: var(--accent);
      letter-spacing: 1px;
    }
    #pe-close-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color var(--transition), background var(--transition);
    }
    #pe-close-btn:hover { color: var(--text); background: var(--surface2); }

    /* Toolbar */
    .pe-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pe-tool-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: .78rem;
      font-family: 'Outfit', sans-serif;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }
    .pe-tool-btn:hover { background: rgba(255,255,255,.12); }
    .pe-tool-btn.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 600;
    }
    .pe-sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

    /* Canvas wrapper — scrollable, fixed height, white border+shadow */
    .pe-canvas-wrap {
      position: relative;
      overflow: auto;
      max-height: 340px;
      cursor: crosshair;
      border: 1.5px solid rgba(255,255,255,0.22);
      border-radius: var(--radius-sm);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 6px 24px rgba(0,0,0,.55);
      background: repeating-conic-gradient(#1c1e2e 0% 25%,#222436 0% 50%) 0 0/16px 16px;
      line-height: 0;
    }
    /* inner sizing set by JS zoom */
    .pe-canvas-inner {
      position: relative;
      display: inline-block;
      transform-origin: top left;
    }
    .pe-canvas-inner canvas {
      display: block;
      image-rendering: pixelated;
    }
    #pe-preview-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      opacity: .65;
    }

    /* Palette */
    .pe-palette-label {
      font-size: .72rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    /* Palette grid */
    .pe-palette {
      display: grid;
      grid-template-columns: repeat(17, 28px); /* 1 eraser + 16 per row = 17 */
      gap: 4px;
    }
    .pe-swatch {
      width: 28px; height: 28px;
      border-radius: 5px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s, border-color .1s;
    }
    .pe-swatch:hover { transform: scale(1.15); }
    .pe-swatch.active {
      border-color: #fff;
      box-shadow: 0 0 0 2px var(--accent);
      transform: scale(1.1);
    }
    /* Eraser swatch (transparent) */
    .pe-swatch-eraser {
      background: repeating-conic-gradient(#555 0% 25%, #333 0% 50%) 0 0 / 10px 10px;
    }

    /* Action buttons */
    .pe-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .pe-btn {
      padding: 8px 18px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .pe-btn-reset  { background: var(--surface2); color: var(--text); }
    .pe-btn-reset:hover { background: rgba(239,68,68,.2); border-color: #ef4444; color: #ef4444; }
    .pe-btn-default { background: var(--surface2); color: var(--muted); }
    .pe-btn-default:hover { background: rgba(255,255,255,.1); color: var(--text); }
    .pe-btn-apply  {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; border-color: transparent;
    }
    .pe-btn-apply:hover { opacity: .88; transform: translateY(-1px); }

    /* Color picker row */
    .pe-color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }
    .pe-color-preview {
      width: 32px; height: 32px;
      border-radius: 6px;
      border: 2px solid rgba(255,255,255,.3);
      flex-shrink: 0;
    }
    .pe-hex-input {
      width: 92px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Outfit', monospace;
      font-size: .82rem;
      padding: 4px 8px;
      outline: none;
    }
    .pe-hex-input:focus { border-color: var(--accent); }
    .pe-opacity-wrap {
      display: flex; align-items: center; gap: 6px; margin-left: auto;
    }
    .pe-opacity-label { font-size: .72rem; color: var(--muted); }
    #pe-opacity-slider {
      -webkit-appearance: none;
      width: 90px; height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,.15);
      outline: none;
      cursor: pointer;
    }
    #pe-opacity-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px rgba(249,199,79,.5);
    }
    #pe-opacity-val { font-size: .78rem; color: var(--text); min-width: 36px; text-align:right; }

    /* Custom scrollbars for Pixel Editor containers */
    .pe-canvas-wrap::-webkit-scrollbar,
    #pe-saved-wrap::-webkit-scrollbar,
    #pixel-editor-modal::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }
    .pe-canvas-wrap::-webkit-scrollbar-track,
    #pe-saved-wrap::-webkit-scrollbar-track,
    #pixel-editor-modal::-webkit-scrollbar-track {
      background: transparent;
    }
    .pe-canvas-wrap::-webkit-scrollbar-thumb,
    #pe-saved-wrap::-webkit-scrollbar-thumb,
    #pixel-editor-modal::-webkit-scrollbar-thumb {
      background: var(--accent);
      border-radius: 10px;
    }
    .pe-canvas-wrap::-webkit-scrollbar-thumb:hover,
    #pe-saved-wrap::-webkit-scrollbar-thumb:hover,
    #pixel-editor-modal::-webkit-scrollbar-thumb:hover {
      background: #fff;
    }

    /* Zoom row */
    .pe-zoom-row {
      display: flex; align-items: center; gap: 6px; margin-left: auto;
    }
    .pe-zoom-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: .9rem; width: 26px; height: 26px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .pe-zoom-btn:hover { background: rgba(255,255,255,.12); }
    #pe-zoom-val { font-size: .75rem; color: var(--muted); min-width: 36px; text-align:center; }

    /* Saved wrap (tab panel) */
    #pe-saved-wrap {
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: var(--radius-sm);
      padding: 8px;
      max-height: 340px;
      overflow-y: auto;
    }

    .pe-btn-draft {
      background: var(--surface2);
      color: #a78bfa;
      border-color: rgba(83,52,131,.5);
    }
    .pe-btn-draft:hover { background: rgba(83,52,131,.25); border-color: #a78bfa; }

    /* Tabs */
    .pe-tabs {
      display: flex;
      gap: 6px;
    }
    .pe-tab-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'Outfit', sans-serif;
      font-size: .8rem;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
    }
    .pe-tab-btn:hover { color: var(--text); background: rgba(255,255,255,.08); }
    .pe-tab-btn.active {
      background: rgba(249,199,79,.15);
      color: var(--accent);
      border-color: var(--accent);
      font-weight: 600;
    }

    /* Vehicle name input */
    .pe-name-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .pe-name-input {
      flex: 1;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      font-size: .85rem;
      padding: 6px 12px;
      outline: none;
      transition: border-color var(--transition);
    }
    .pe-name-input:focus { border-color: var(--accent); }
    .pe-name-input::placeholder { color: var(--muted); }

    /* Saved vehicles list */
    .pe-saved-section {
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .pe-saved-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: var(--radius-sm);
      transition: background var(--transition);
    }
    .pe-saved-item:hover { background: var(--surface2); }
    .pe-saved-name {
      flex: 1;
      font-size: .82rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pe-saved-load, .pe-saved-apply, .pe-saved-del {
      background: none;
      border: none;
      cursor: pointer;
      font-size: .85rem;
      padding: 2px 6px;
      border-radius: 4px;
      transition: background var(--transition);
      color: var(--text);
    }
    .pe-saved-load:hover  { background: rgba(255,255,255,.1); }
    .pe-saved-apply:hover { background: rgba(249,199,79,.2); }
    .pe-saved-del:hover   { background: rgba(239,68,68,.2); }

    /* In-editor toast */
    #pe-toast {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(249,199,79,.9);
      color: #000;
      font-size: .8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
      white-space: nowrap;
    }
    #pe-toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Design button in top bar */
    #design-btn {
      background: var(--surface);
      border: 1px solid rgba(83,52,131,.6);
      color: #a78bfa;
      font-family: 'Outfit', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition);
      backdrop-filter: var(--blur);
    }
    #design-btn:hover { background: rgba(83,52,131,.4); border-color: #a78bfa; }
  </style>
</head>
<body>
<div id="app-wrapper">

  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="loader"></div>
    <h1>Music Journey</h1>
    <p>Đang khởi tạo engine...</p>
  </div>

  <!-- PixiJS Canvas -->
  <div id="app"></div>

  <!-- Audio element (ẩn, chỉ dùng để phân tích) -->
  <audio id="audio-el" crossorigin="anonymous" preload="none"></audio>

  <!-- Top Bar -->
  <div id="top-bar">
    <div class="logo">🚐 MUSIC JOURNEY 2D</div>
    <div class="top-selects">
      <button id="design-btn">🎨 Thiết kế xe</button>
      <button id="shop-btn">🛒 Shop</button>
      <button id="auth-btn">Loading...</button>
      <select id="env-select" title="Chọn môi trường">
        <option value="beach">🏖️ Bãi biển</option>
        <option value="desert">🏜️ Sa mạc</option>
        <option value="snow">🏔️ Núi tuyết</option>
        <option value="jungle">🌿 Rừng Rậm 🔒</option>
      </select>
      <select id="vehicle-select" title="Chọn xe">
        <option value="van">🚐 Xe Van (Miễn phí)</option>
        <option value="jeep">🔒 Jeep Địa Hình – 49k</option>
        <option value="pickup">🔒 Xe Bán Tải – 39k</option>
        <option value="custom">🎨 Xe Tự Thiết Kế</option>
      </select>
    </div>
  </div>

  <!-- Lock Toast -->
  <div id="lock-toast"></div>

  <!-- Debug HUD -->
  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">Trạng thái</span>
      <span id="fsm-state">IDLE</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">Tốc độ</span>
      <div class="hud-bar-wrap"><div class="hud-bar" id="speed-bar" style="width:0%"></div></div>
    </div>
    <div class="hud-row">
      <span class="hud-label">Bass</span>
      <div class="hud-bar-wrap"><div class="hud-bar" id="bass-bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Playlist Button -->
  <button id="playlist-btn" title="Playlist">🎵</button>

  <!-- Playlist Panel -->
  <div id="playlist-panel">
    <div class="playlist-header">
      <h3>📋 Playlist</h3>
      <button id="upload-track-btn" title="Tải nhạc từ máy tính">
        <span class="upload-icon">📂</span> + Tải Nhạc
      </button>
    </div>
    <input type="file" id="custom-track-input" accept="audio/*" multiple />
    <div id="playlist-items"></div>
  </div>

  <!-- Player Panel -->
  <div id="player-panel">
    <div class="player-card">

      <!-- Left: Track info -->
      <div class="track-info">
        <div class="album-art" id="album-art">🎵</div>
        <div class="track-text">
          <span id="track-name">Chọn bài nhạc...</span>
          <span id="time-display">0:00 / 0:00</span>
        </div>
      </div>

      <!-- Center: Controls + Progress -->
      <div class="controls-center">
        <div class="ctrl-buttons">
          <button class="ctrl-btn" id="prev-btn" title="Bài trước">⏮</button>
          <button id="play-btn" title="Phát/Dừng"><span class="icon">▶</span></button>
          <button class="ctrl-btn" id="next-btn" title="Bài kế">⏭</button>
        </div>
        <div class="progress-wrap">
          <div id="progress-bar"><div id="progress-fill"></div></div>
        </div>
      </div>

      <!-- Right: Volume + Visualizer -->
      <div class="right-panel">
        <div class="volume-row">
          <span class="vol-icon">🔈</span>
          <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8" />
          <span class="vol-icon">🔊</span>
        </div>
        <canvas id="visualizer" width="180" height="36"></canvas>
      </div>

    </div>
  </div>
  <!-- Pixel Art Editor Modal -->
  <div id="pixel-editor-overlay">
    <div id="pixel-editor-modal">

      <!-- Header -->
      <div class="pe-header">
        <span class="pe-title">🎨 PIXEL ART VEHICLE DESIGNER</span>
        <button id="pe-close-btn" title="Đóng">✕</button>
      </div>

      <!-- Name + Tabs -->
      <div class="pe-name-row">
        <label class="pe-palette-label" for="pe-vehicle-name">Tên xe</label>
        <input type="text" id="pe-vehicle-name" class="pe-name-input" placeholder="VD: Xe Rồng Đỏ..." maxlength="30" />
      </div>
      <div class="pe-tabs">
        <button class="pe-tab-btn active" id="pe-tab-body">🚐 Thân xe (64×32)</button>
        <button class="pe-tab-btn"        id="pe-tab-wheel">🔵 Bánh xe (24×24)</button>
        <button class="pe-tab-btn"        id="pe-tab-saved">🗂 Mẫu đã lưu</button>
      </div>

      <!-- Toolbar -->
      <div class="pe-toolbar">
        <button class="pe-tool-btn active" id="pe-tool-pen"    title="Bút (P)">✏️ Bút</button>
        <button class="pe-tool-btn"        id="pe-tool-eraser" title="Tẩy (E)">🧹 Tẩy</button>
        <button class="pe-tool-btn"        id="pe-tool-fill"   title="Đổ màu (F)">🪣 Đổ màu</button>
        <button class="pe-tool-btn"        id="pe-tool-line"   title="Đường thẳng (L)">╱ Đường</button>
        <button class="pe-tool-btn"        id="pe-tool-circle" title="Vẽ tròn (C)">○ Tròn</button>
        <div class="pe-sep"></div>
        <button class="pe-tool-btn"        id="pe-tool-undo"   title="Hoàn tác (Ctrl+Z)">↩️ Hoàn tác</button>
        <div class="pe-zoom-row">
          <button class="pe-zoom-btn" id="pe-zoom-out" title="Thu nhỏ">−</button>
          <span id="pe-zoom-val">100%</span>
          <button class="pe-zoom-btn" id="pe-zoom-in"  title="Phóng to">+</button>
        </div>
      </div>

      <!-- Body canvas -->
      <div class="pe-canvas-wrap" id="pe-body-wrap">
        <div class="pe-canvas-inner" id="pe-body-inner">
          <canvas id="pe-body-canvas"></canvas>
          <canvas id="pe-preview-canvas"></canvas>
        </div>
      </div>

      <!-- Wheel canvas -->
      <div class="pe-canvas-wrap" id="pe-wheel-wrap" style="display:none">
        <div class="pe-canvas-inner" id="pe-wheel-inner">
          <canvas id="pe-wheel-canvas"></canvas>
        </div>
      </div>

      <!-- Saved vehicles tab panel -->
      <div id="pe-saved-wrap" style="display:none">
        <div id="pe-saved-list"></div>
      </div>

      <!-- Palette -->
      <div>
        <div class="pe-palette-label">Bảng màu (32 màu)</div>
        <div class="pe-palette" id="pe-palette"></div>
        <!-- Color picker row -->
        <div class="pe-color-row">
          <div class="pe-color-preview" id="pe-color-preview"></div>
          <input type="text" id="pe-hex-input" class="pe-hex-input" placeholder="#1a1a2e" maxlength="7" />
          <div class="pe-opacity-wrap">
            <span class="pe-opacity-label">Độ trong suốt</span>
            <input type="range" id="pe-opacity-slider" min="0" max="255" value="255" />
            <span id="pe-opacity-val">100%</span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="pe-actions">
        <button class="pe-btn pe-btn-reset"   id="pe-reset-btn">↺ Xóa tab hiện tại</button>
        <button class="pe-btn pe-btn-default" id="pe-default-btn">🚐 Mặc định</button>
        <button class="pe-btn pe-btn-draft"   id="pe-draft-btn">📋 Lưu nháp</button>
        <button class="pe-btn pe-btn-apply"   id="pe-apply-btn">💾 Lưu & Áp dụng</button>
      </div>

      <div id="pe-toast"></div>
    </div>
  </div>


</div>

<script>
  document.getElementById('playlist-btn').addEventListener('click', () => {
    document.getElementById('playlist-panel').classList.toggle('open');
  });

  document.querySelectorAll('.pl-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      if (window.__loadTrack) {
        window.__loadTrack(idx);
        const audioEl = document.getElementById('audio-el');
        audioEl.play();
        document.getElementById('play-btn').innerHTML = '<span class="icon">⏸</span>';
        document.getElementById('album-art').classList.add('playing');
      }
    });
  });

  document.getElementById('audio-el').addEventListener('play', () => {
    document.getElementById('album-art').classList.add('playing');
  });
  document.getElementById('audio-el').addEventListener('pause', () => {
    document.getElementById('album-art').classList.remove('playing');
  });

  document.addEventListener('click', (e) => {
    const panel = document.getElementById('playlist-panel');
    const btn   = document.getElementById('playlist-btn');
    if (!panel.contains(e.target) && e.target !== btn) {
      panel.classList.remove('open');
    }
  });

  // Design button → open pixel editor via global bridge from main.ts
  document.getElementById('design-btn').addEventListener('click', () => {
    if (window.__openPixelEditor) {
      // Defer execution slightly to let the browser complete painting the button click state (fixes Chrome INP warning)
      setTimeout(() => {
        window.__openPixelEditor();
      }, 0);
    }
  });
</script>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
